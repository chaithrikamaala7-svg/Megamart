<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width-device-width,initial-scale-1.0">
    <title>Login Page</title>

    <style>
        .form {
            padding: 20px;
            margin: 20px;
            border: 2px solid black;
            width: 340px;
            text-align: left;
            background: white;
        }

        .container {
            margin: 200px;
            border-radius: 12px;
        }

        .button {
            background-color: rgb(182, 188, 194);
            border-radius: 12px;
            width: 350px;
            height: 34px;
        }

        .main-box {
            width: 800px;
            height: 450px;
            display: flex;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
            background: white;
        }

        .left {
            width: 50%;
        }

        .left img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .right {
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .social-icons img {
            width: 40px;
            height: 40px;
            margin: 0 10px;
            cursor: pointer;
        }

        .navbar{
            padding: 20px;
        }
        ul{
            background-color: rgb(226, 226, 227);
            list-style: none;
            padding: 14px;
            margin: 0px;
        }

        ul li {  
            display: inline-block;
            margin-right: 20px;
        }
        ul li a {
            display: block;
            color: rgb(0, 0, 0);
        }

        ul li a:hover {
            background-color: rgb(202, 230, 255);
        }
        .logo a{
            color: red;
            font-size: 50px;
            font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif
        }
        .header{
            background-color: black;
            padding: 0.00009%;
            color: #f5f5f5;
            text-align: center;
            font-size: 10px;
            font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }
    </style>
</head>

<body>
    <div class="header">
        <h3>***15% off for New Users***</h3>
    </div>
    <nav class="navbar">
        <div class="navdiv">
            <div class="logo">
                <a >megamart</a>
                <span style="float: right; padding: 2px;">
                    <input type="text" placeholder="Search..." border="none" style="height: 20px; border-radius: 15px;">
                    <img src="images/search.svg" alt="search">
                    <img src="images/loc.svg" alt="location">
                    <img src="images/log.svg" alt="cart">
                    <img src="images/fav.svg" alt="favorite">
                    <img src="images/cart.svg" alt="cart">
                </span>
            </div>
            <ul>
                <li><a href="#men">Men</a></li>
                <li><a href="#women">Women</a></li>
                <li><a href="#kids">Kids</a></li>
                <li><a href="#Footwear">Footwear</a></li>
                <li><a href="#accessories">Accessories</a></li>
                <li><a href="#winterwear">Winter Wear</a></li>
                <li><a href="#brands">Brands</a></li>
            </ul>
        </div>
    </nav>
    <center>
        <div class="container">
            <div class="main-box">
                <div class="left">
                    <img src="images/img.png">
                </div>

                <div class="right">
                    <div class="form login">
                        <form action="#">
                            <center>
                                <h2>Login / SignUp</h2>
                            </center>
                            <br>
                            <label for="number">Mobile Number*</label><br>
                            <input type="number" id="number" name="number" size="200"
                                placeholder="+91 - Enter Your Number" required><br><br>
                            <button class="button">CONTINUE</button>
                            <P>By proceeding, you agree to <u>Privacy Policy \ T&C</u></P>
                            <br />
                            <br />
                            <center>
                                <p style="color: rgb(190, 184, 184); border: black; border-radius: 12px;">Or login with
                                </p>
                                <div class="social-icons">
                                    <img src="images/google.svg" alt="google">
                                    <img src="images/facebook.svg" alt="facebook">
                                </div>
                                <p>Having trouble logging in? <b><u>Contact Us</u></b></p>
                            </center>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </center>
</body>

</html>
